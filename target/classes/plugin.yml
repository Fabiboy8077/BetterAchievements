name: BetterAchievements
version: 1.0.0
main: nl.frostnetwork.betterachievements.BetterAchievements
api-version: '1.21'
author: FrostNetwork
description: Uitgebreid achievement systeem voor FrostSkyblock.
softdepend: [Vault, PlaceholderAPI]
commands:
  achievements:
    description: Open de achievements GUI of beheer achievement data.
    usage: /achievements [reload|reset <speler>|resetall]
    aliases: [ach, betterachievements]
permissions:
  betterachievements.admin:
    description: Toegang tot admin commando's van BetterAchievements.
    default: op
