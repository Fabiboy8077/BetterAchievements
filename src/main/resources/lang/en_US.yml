prefix: "&8[&bBetterAchievements&8] "

achievement:
  completed: "&aAchievement completed: &f%achievement%&a!"
  claimed: "&aReward claimed: &f%achievement%&a!"
  already_claimed: "&cYou have already claimed this achievement."
  locked: "&cThis achievement is locked."
  no_permission: "&cYou don't have permission."
  reload: "&aAll configuration files have been successfully reloaded!"
  reset_usage: "&cUsage: /betterachievements reset <player>"
  reset_player_not_found: "&cNo stored achievement data found for &f%player%&c."
  reset_player_success: "&aAchievements for &f%player% &ahave been reset."
  reset_all_success: "&aAll achievement data has been reset. &7(%count% player files deleted)"
  reset_all_partial: "&eAchievement data reset, but &f%failed% &efile(s) could not be deleted. &7(%count% deleted)"
  reset_failed: "&cReset failed. Check the console for details."

gui:
  title: "&3BetterAchievements - Page %page%"
  next_page: "&bNext Page"
  previous_page: "&bPrevious Page"
  claim: "&aClick to claim reward"
  rewards_label: "&bRewards:"
  completed: "&aCompleted"
  locked: "&7Locked"
  status: "&7Status: %status%"
  active_lore:
    - "&7Task: &f%task%"
    - "&7Progress: &b%progress%&8/&b%required%"
    - ""
    - "%rewards%"
    - ""
    - "&eWork on this achievement!"
  claimable_lore:
    - "&7Task: &f%task%"
    - "&7Progress: &b%progress%&8/&b%required%"
    - ""
    - "%rewards%"
    - ""
    - "&aClick to claim reward!"
  claimed_lore:
    - "&7Task: &f%task%"
    - ""
    - "%rewards%"
    - ""
    - "&aYou have already claimed this!"
  locked_name: "&c???"
  locked_hint_prefix: " &8• &7Hint: &b"
  locked_lore:
    - ""
    - " &8• &7This achievement is"
    - "   &7not yet unlocked."
    - ""
    - " &8• &7Hint: &b%hint%"
    - ""
    - " &7Complete the previous step first."

actionbar:
  progress: "&b%achievement% &8• &f%current%&7/&f%required% &7(%percentage%%)"
  completed: "&aAchievement completed! Open /achievements"

